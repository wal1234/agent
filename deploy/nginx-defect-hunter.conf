# /etc/nginx/sites-available/defect-hunter
#
# 安装：
#   sudo ln -s /etc/nginx/sites-available/defect-hunter /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS 申请（拿到证书后 certbot 会自动改写为 443 配置）：
#   sudo certbot --nginx -d defect-hunter.example.com

upstream defect_hunter_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name defect-hunter.example.com;   # ⚠️ 替换为你的域名或 _

    # ACME 验证目录（certbot 用）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass         http://defect_hunter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 大文件上传
        client_max_body_size 50m;

        # LLM 调用 + 编排子图较慢，给 5 分钟超时
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ===== 可选：API 鉴权 =====
    # 取消下面这段注释，给所有 /api/v1 请求加 token 校验
    # location /api/v1/ {
    #     if ($http_x_api_token != "请改成你的随机长字符串") {
    #         return 401;
    #     }
    #     proxy_pass http://defect_hunter_backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     client_max_body_size 50m;
    #     proxy_read_timeout 300s;
    # }

    # ===== 可选：限制访问 IP =====
    # location /api/v1/ {
    #     allow 203.0.113.0/24;     # 公司出口
    #     allow 198.51.100.42;      # 堡垒机
    #     deny  all;
    #     proxy_pass http://defect_hunter_backend;
    #     # ...
    # }
}
